<!DOCTYPE html>
<html>
<head>
  <title>SafeGuard Live Tracker</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: white; font-family: sans-serif; }
    #status {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #1a0a0e; border: 1px solid #e85d75; border-radius: 20px;
      padding: 10px 20px; font-size: 13px; color: #e85d75; z-index: 10;
      white-space: nowrap;
    }
    #sos-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #cc0022; color: white; text-align: center;
      padding: 14px; font-size: 16px; font-weight: 700; z-index: 20;
    }
    #map { width: 100vw; height: calc(100vh - 50px); border: none; }
    #history {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0f0f1a; border-top: 1px solid #1a1a2e;
      padding: 12px 16px; font-size: 11px; color: #666;
    }
    #open-maps {
      position: fixed; bottom: 50px; right: 16px;
      background: #e85d75; color: white; border: none;
      border-radius: 25px; padding: 12px 20px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="sos-banner">🚨 SOS EMERGENCY ALERT</div>
  <div id="status">⏳ Waiting for location...</div>
  <iframe id="map" src="" style="width:100vw;height:calc(100vh - 50px);border:none;"></iframe>
  <button id="open-maps" onclick="openInMaps()">📍 Open in Maps</button>
  <div id="history">No location yet</div>
  <script>
    let currentLat = null, currentLng = null;
    const historyLog = [];

    function updateMap(lat, lng) {
      currentLat = lat; currentLng = lng;
      document.getElementById('map').src =
        `https://maps.google.com/maps?q=${lat},${lng}&z=17&output=embed`;
      document.getElementById('status').innerHTML =
        `📍 Live: ${lat.toFixed(5)}, ${lng.toFixed(5)} · ${new Date().toLocaleTimeString()}`;
      historyLog.unshift(`${lat.toFixed(4)}, ${lng.toFixed(4)} at ${new Date().toLocaleTimeString()}`);
      document.getElementById('history').textContent =
        'History: ' + historyLog.slice(0, 5).join(' → ');
    }

    function openInMaps() {
      if (currentLat && currentLng)
        window.open(`https://www.google.com/maps?q=${currentLat},${currentLng}`);
    }

    const params = new URLSearchParams(window.location.search);
    const urlLat = parseFloat(params.get('lat'));
    const urlLng = parseFloat(params.get('lng'));
    if (urlLat && urlLng) {
      updateMap(urlLat, urlLng);
    }

    try {
      const socket = io(window.location.origin);
      socket.on('locationUpdate', ({ lat, lng }) => updateMap(lat, lng));
      socket.on('sosAlert', ({ trigger, time }) => {
        document.getElementById('sos-banner').style.display = 'block';
        document.getElementById('sos-banner').textContent =
          `🚨 SOS — ${trigger} at ${new Date(time).toLocaleTimeString()}`;
      });
    } catch(e) {}
  </script>
</body>
</html>
