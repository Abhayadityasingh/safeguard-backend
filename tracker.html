<!DOCTYPE html>
<html>
<head>
  <title>SafeGuard Live Tracker</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: white; font-family: sans-serif; }
    #status {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #1a0a0e; border: 1px solid #e85d75; border-radius: 20px;
      padding: 8px 20px; font-size: 13px; color: #e85d75; z-index: 10;
    }
    #map { width: 100vw; height: 100vh; border: none; }
    #history {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0f0f1a; border-top: 1px solid #1a1a2e;
      padding: 12px 16px; font-size: 11px; color: #555;
    }
  </style>
</head>
<body>
  <div id="status">⏳ Waiting for location...</div>
  <iframe id="map" src="" style="width:100vw;height:calc(100vh - 50px);border:none;"></iframe>
  <div id="history">No location history yet</div>
  <script>
    const socket = io(window.location.origin);
    const history = [];
    socket.on("locationUpdate", ({ lat, lng }) => {
      document.getElementById("map").src =
        `https://maps.google.com/maps?q=${lat},${lng}&z=17&output=embed`;
      document.getElementById("status").textContent =
        `📍 Live: ${lat.toFixed(5)}, ${lng.toFixed(5)} · ${new Date().toLocaleTimeString()}`;
      history.unshift(`${lat.toFixed(4)}, ${lng.toFixed(4)} at ${new Date().toLocaleTimeString()}`);
      document.getElementById("history").textContent =
        "History: " + history.slice(0, 5).join(" → ");
    });
    socket.on("sosAlert", ({ trigger, time }) => {
      document.getElementById("status").style.background = "#450a0a";
      document.getElementById("status").textContent =
        `🚨 SOS TRIGGERED — ${trigger} at ${new Date(time).toLocaleTimeString()}`;
    });
  </script>
</body>
</html>
